<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logic Writer | Local Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --accent: #ccff00; --bg-base: #0f1115; --border: rgba(255, 255, 255, 0.08); }
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--bg-base); 
            color: #e2e2e6;
            margin: 0; 
            padding: 0; 
        }

        .glass-card { 
            background: rgba(26, 28, 30, 0.6); 
            backdrop-filter: blur(20px); 
            border-radius: 24px; 
            border: 1px solid var(--border);
        }

        .btn-primary { 
            background: var(--accent); 
            color: #000; 
            font-weight: 800; 
            transition: 0.3s; 
            cursor: pointer; 
            border: none; 
        }

        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(204, 255, 0, 0.3); }

        .tag-ref { 
            font-size: 10px; 
            font-weight: 800; 
            padding: 6px 10px; 
            border-radius: 8px; 
            background: rgba(255,255,255,0.05); 
            color: var(--accent); 
            cursor: pointer; 
            transition: 0.2s;
        }
        .tag-ref:hover { background: var(--accent); color: black; }

        /* PREVIEW STYLING */
        #preview-box { line-height: 1.6; color: #e2e2e6; }
        .logic-box { padding: 25px; margin: 30px 0; border-radius: 20px; border: 2px solid; }
        
        .custom-collapse { border-radius: 20px; overflow: hidden; margin: 20px 0; border: 1px solid var(--border); }
        .custom-collapse summary { padding: 20px; cursor: pointer; font-weight: 700; list-style: none; display: flex; justify-content: space-between; align-items: center; }
        .custom-collapse summary::after { content: '+'; }
        .custom-collapse[open] summary::after { content: '−'; }
        .collapse-body { padding: 20px; }

        .code-container { position: relative; background: #1a1c1e; color: #e2e2e6; padding: 25px; border-radius: 20px; margin: 25px 0; font-family: monospace; border: 1px solid var(--border); overflow-x: auto; }
        .copy-btn { position: absolute; top: 12px; right: 12px; background: var(--accent); color: black; border: none; padding: 6px 12px; border-radius: 10px; font-size: 0.7rem; cursor: pointer; font-weight: bold; }
        
        .tw-cursor::after { content: '|'; animation: blink 1s infinite; margin-left: 2px; }
        @keyframes blink { 50% { opacity: 0; } }

        #preview-box img, #preview-box video { width: 100%; border-radius: 25px; margin: 25px 0; border: 1px solid var(--border); }
        
        textarea { background: #1a1c1e !important; color: white !important; border: 1px solid rgba(255,255,255,0.1) !important; }
    </style>
</head>
<body class="min-h-screen pb-20 p-4 lg:p-12">

    <input type="color" id="color-picker" class="hidden" onchange="insertColor(this.value)">

    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-3xl font-black tracking-tighter italic text-white">LOGIC WRITER</h1>
                <p id="status-bar" class="text-[10px] font-black text-[#ccff00] uppercase tracking-[0.2em]">Offline Local Mode</p>
            </div>
            <div class="flex gap-3">
                <button onclick="clearStorage()" class="p-3 bg-red-900/20 text-red-500 rounded-xl hover:bg-red-500 hover:text-white transition-all text-xs font-bold">CLEAR ALL</button>
            </div>
        </header>

        <div class="space-y-6">
            <div class="glass-card p-4 flex flex-wrap justify-between gap-4">
                <div class="flex flex-wrap gap-2 items-center">
                    <span class="tag-ref" onclick="insertTag('tw')">Typewriter</span>
                    <span class="tag-ref" onclick="insertTag('box')">Box</span>
                    <span class="tag-ref" onclick="insertTag('collapse')">Collapse</span>
                    <span class="tag-ref" onclick="insertTag('heading')">Heading</span>
                    <span class="tag-ref" onclick="insertTag('align')">Align</span>
                    <span class="tag-ref" onclick="insertTag('code')">Code</span>
                    <span class="tag-ref" onclick="insertTag('list')">List</span>
                    <span class="tag-ref" onclick="document.getElementById('color-picker').click()" style="background:#ccff00; color:black;">Color Palette</span>
                </div>
                <div class="flex bg-white/5 p-1 rounded-xl">
                    <button onclick="setMode('write')" id="btn-write" class="px-6 py-2 rounded-lg text-[10px] font-black uppercase bg-[#ccff00] text-black shadow-sm transition-all">Write</button>
                    <button onclick="setMode('preview')" id="btn-preview" class="px-6 py-2 rounded-lg text-[10px] font-black uppercase text-slate-400 transition-all">Preview</button>
                </div>
            </div>

            <div class="glass-card p-8 min-h-[700px] flex flex-col relative">
                <div class="mb-6">
                    <input type="text" id="doc-title" placeholder="Document Title..." class="font-black text-3xl bg-transparent border-none outline-none w-full tracking-tighter text-white">
                    <span class="text-[9px] font-black text-[#ccff00] uppercase block mt-1 tracking-widest">Auto-saving to LocalStorage</span>
                </div>
                
                <textarea id="editor" spellcheck="false" placeholder="Start writing logic..." class="flex-1 w-full p-6 rounded-2xl outline-none font-mono text-sm leading-relaxed mb-4 resize-none min-h-[500px]"></textarea>
                
                <div id="preview-box" class="hidden flex-1 w-full p-6 rounded-2xl bg-transparent overflow-y-auto min-h-[500px]"></div>

                <div class="flex justify-end mt-4">
                    <button onclick="downloadNote()" class="btn-primary px-8 py-3 rounded-xl text-[10px] font-black">
                        DOWNLOAD .MD
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // CORE LOGIC
        const editor = document.getElementById('editor');
        const titleInput = document.getElementById('doc-title');

        // Load data on startup
        window.onload = () => {
            const savedContent = localStorage.getItem('logic_content');
            const savedTitle = localStorage.getItem('logic_title');
            if (savedContent) editor.value = savedContent;
            if (savedTitle) titleInput.value = savedTitle;
        };

        // Auto-save on typing
        editor.addEventListener('input', () => {
            localStorage.setItem('logic_content', editor.value);
        });

        titleInput.addEventListener('input', () => {
            localStorage.setItem('logic_title', titleInput.value);
        });

        function setMode(mode) {
            const preview = document.getElementById('preview-box');
            const btnW = document.getElementById('btn-write');
            const btnP = document.getElementById('btn-preview');

            if(mode === 'preview') {
                editor.classList.add('hidden');
                preview.classList.remove('hidden');
                // UI Toggle
                btnP.classList.add('bg-[#ccff00]', 'text-black');
                btnP.classList.remove('text-slate-400');
                btnW.classList.remove('bg-[#ccff00]', 'text-black');
                btnW.classList.add('text-slate-400');
                renderPreview();
            } else {
                editor.classList.remove('hidden');
                preview.classList.add('hidden');
                // UI Toggle
                btnW.classList.add('bg-[#ccff00]', 'text-black');
                btnW.classList.remove('text-slate-400');
                btnP.classList.remove('bg-[#ccff00]', 'text-black');
                btnP.classList.add('text-slate-400');
            }
        }

        function renderPreview() {
            const preview = document.getElementById('preview-box');
            let text = editor.value;

            // Custom Tag Parsing (Matching original logic)
            text = text.replace(/<align type="(.*?)">([\s\S]*?)<\/align>/g, '<div style="text-align:$1">$2</div>');
            text = text.replace(/<heading size="(.*?)" align="(.*?)">([\s\S]*?)<\/heading>/g, (m, s, a, c) => {
                const fontSize = (2.5 - (s * 0.3)) + "rem";
                return `<div style="font-size:${fontSize}; text-align:${a}; font-weight:800; margin:1rem 0; color:white;">${c}</div>`;
            });
            text = text.replace(/<collapse heading="(.*?)" color="(.*?)" bg-color="(.*?)">([\s\S]*?)<\/collapse>/g, (m, h, c, bg, con) => {
                return `<details class="custom-collapse" style="border: 2px solid ${c}; background: ${bg}20;">
                            <summary style="color:${c}; font-weight:700;">${h}</summary>
                            <div class="collapse-body">${con}</div>
                        </details>`;
            });
            text = text.replace(/<tw state="(.*?)" color="(.*?)" type="(.*?)">([\s\S]*?)<\/tw>/g, (m, s, c, t, con) => `<span class="tw-cursor" style="color:${c}; font-weight:${t.includes('bold')?'800':'400'}">${con}</span>`);
            text = text.replace(/<list type="(.*?)">([\s\S]*?)<\/list>/g, (m, type, content) => {
                const tag = type === 'number' ? 'ol' : 'ul';
                const style = type === 'number' ? 'list-style-type: decimal;' : 'list-style-type: disc;';
                return `<${tag} style="margin:15px 0 15px 40px; ${style}">${content.trim().split('\n').map(i => `<li>${i.trim()}</li>`).join('')}</${tag}>`;
            });
            text = text.replace(/<box color="(.*?)"(?: type="(.*?)")?>([\s\S]*?)<\/box>/g, (m, c, t, con) => `<div class="logic-box" style="border-color:${c}; background:${c}10; border-style:${t === 'dotted' ? 'dotted' : 'solid'}">${con}</div>`);
            text = text.replace(/<code>([\s\S]*?)<\/code>/g, (m, code) => {
                return `<div class="code-container"><button class="copy-btn">Copy</button><pre><code>${code.trim()}</code></pre></div>`;
            });

            preview.innerHTML = marked.parse(text);
            
            // Re-bind copy buttons
            document.querySelectorAll('.copy-btn').forEach(btn => btn.onclick = () => { 
                navigator.clipboard.writeText(btn.nextElementSibling.innerText); 
                btn.innerText = "COPIED"; 
                setTimeout(() => btn.innerText = "COPY", 2000); 
            });
        }

        function insertTag(type) {
            const start = editor.selectionStart;
            const end = editor.selectionEnd;
            const text = editor.value;
            const tags = {
                tw: '<tw state="active" color="#ccff00" type="bold">Text</tw>',
                box: '<box color="#ccff00" type="solid">Content</box>',
                collapse: '<collapse heading="Title" color="#ccff00" bg-color="#000000">Body</collapse>',
                heading: '<heading size="1" align="left">Headline</heading>',
                align: '<align type="center">Content</align>',
                code: '<code>\n// Your Code Here\n</code>',
                list: '<list type="bullet">\nitem 1\nitem 2\n</list>'
            };
            editor.value = text.substring(0, start) + (tags[type] || '') + text.substring(end);
            localStorage.setItem('logic_content', editor.value);
            editor.focus();
        }

        function insertColor(color) {
            const start = editor.selectionStart;
            const text = editor.value;
            editor.value = text.substring(0, start) + color + text.substring(start);
            localStorage.setItem('logic_content', editor.value);
            editor.focus();
        }

        function clearStorage() {
            if(confirm("Delete everything? This cannot be undone.")) {
                localStorage.clear();
                location.reload();
            }
        }

        function downloadNote() {
            const blob = new Blob([editor.value], { type: 'text/markdown' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = (titleInput.value || 'note') + '.md';
            a.click();
        }
    </script>
</body>
</html>

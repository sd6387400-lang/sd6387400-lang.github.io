<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logic Writer | Local Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root[data-theme="light"] {
            --bg-base: #f4f7ff;
            --card-bg: rgba(255, 255, 255, 0.8);
            --text-main: #1a1c1e;
            --text-muted: #64748b;
            --border: rgba(0, 0, 0, 0.1);
            --editor-bg: #ffffff;
            --accent: #0066ff;
            --accent-text: #ffffff;
        }

        :root[data-theme="dark"] {
            --bg-base: #0f1115;
            --card-bg: rgba(26, 28, 30, 0.6);
            --text-main: #e2e2e6;
            --text-muted: #94a3b8;
            --border: rgba(255, 255, 255, 0.08);
            --editor-bg: #1a1c1e;
            --accent: #ccff00;
            --accent-text: #000000;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--bg-base); 
            color: var(--text-main);
            margin: 0; 
            padding: 0; 
            transition: background-color 0.3s ease;
        }

        .glass-card { 
            background: var(--card-bg); 
            backdrop-filter: blur(20px); 
            border-radius: 24px; 
            border: 1px solid var(--border);
        }

        .btn-primary { 
            background: var(--accent); 
            color: var(--accent-text); 
            font-weight: 800; 
            transition: 0.3s; 
            cursor: pointer; 
            border: none; 
        }

        .tag-ref { 
            font-size: 10px; 
            font-weight: 800; 
            padding: 6px 10px; 
            border-radius: 8px; 
            background: rgba(128,128,128,0.1); 
            color: var(--accent); 
            cursor: pointer; 
            transition: 0.2s;
        }
        .tag-ref:hover { background: var(--accent); color: var(--accent-text); }

        /* MATCHED PREVIEW STYLING FROM GET-STARTED2.HTML */
        #preview-box { line-height: 1.6; color: var(--text-main); }
        .logic-box { padding: 25px; margin: 30px 0; border-radius: 20px; border: 2px solid; }
        
        .custom-collapse { border-radius: 20px; overflow: hidden; margin: 20px 0; border: 1px solid var(--border); }
        .custom-collapse summary { padding: 20px; cursor: pointer; font-weight: 700; list-style: none; display: flex; justify-content: space-between; align-items: center; }
        .custom-collapse summary::after { content: '+'; font-size: 1.2rem; }
        .custom-collapse[open] summary::after { content: '−'; }
        .collapse-body { padding: 20px; }

        .code-container { position: relative; background: #1a1c1e; color: #e2e2e6; padding: 25px; border-radius: 20px; margin: 25px 0; font-family: monospace; border: 1px solid var(--border); overflow-x: auto; }
        .copy-btn { position: absolute; top: 12px; right: 12px; background: var(--accent); color: var(--accent-text); border: none; padding: 6px 12px; border-radius: 10px; font-size: 0.7rem; cursor: pointer; font-weight: bold; }
        
        .tw-cursor::after { content: '|'; animation: blink 1s infinite; margin-left: 2px; }
        @keyframes blink { 50% { opacity: 0; } }

        #preview-box img, #preview-box video, #preview-box audio { width: 100%; border-radius: 25px; margin: 25px 0; border: 1px solid var(--border); }
        #preview-box img { border: none !important; }
        
        .custom-href { color: var(--accent); text-decoration: none; font-weight: 700; transition: 0.2s; }
        .custom-href:hover { text-decoration: underline; opacity: 0.8; }
        
        textarea { background: var(--editor-bg) !important; color: var(--text-main) !important; border: 1px solid var(--border) !important; }
        
        select.theme-selector {
            background: var(--card-bg);
            color: var(--text-main);
            border: 1px solid var(--border);
            padding: 8px;
            border-radius: 12px;
            font-size: 10px;
            font-weight: 800;
            outline: none;
            cursor: pointer;
        }
    </style>
</head>
<body class="min-h-screen pb-20 p-4 lg:p-12">

    <input type="color" id="color-picker" class="hidden" onchange="insertColor(this.value)">

    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-3xl font-black tracking-tighter italic">GET STARTED VIEW WRITER</h1>
                <p id="status-bar" class="text-[10px] font-black text-[#ccff00] uppercase tracking-[0.2em]">Local Mode for anybody</p>
            </div>
            <div class="flex items-center gap-3">
                <select id="theme-choice" class="theme-selector" onchange="changeTheme(this.value)">
                    <option value="dark">Dark Mode</option>
                    <option value="light">Light Mode</option>
                    <option value="system">System Default</option>
                </select>
                <button onclick="clearStorage()" class="p-3 bg-red-900/20 text-red-500 rounded-xl hover:bg-red-500 hover:text-white transition-all text-xs font-bold uppercase">Clear All</button>
            </div>
        </header>

        <div class="space-y-6">
            <div class="glass-card p-4 flex flex-wrap justify-between gap-4">
                <div class="flex flex-wrap gap-2 items-center">
                    <span class="tag-ref" onclick="insertTag('tw')">Typewriter</span>
                    <span class="tag-ref" onclick="insertTag('box')">Box</span>
                    <span class="tag-ref" onclick="insertTag('collapse')">Collapse</span>
                    <span class="tag-ref" onclick="insertTag('heading')">Heading</span>
                    <span class="tag-ref" onclick="insertTag('href')">Link (Href)</span>
                    <span class="tag-ref" onclick="insertTag('text')">Styled Text</span>
                    <span class="tag-ref" onclick="insertTag('align')">Align</span>
                    <span class="tag-ref" onclick="insertTag('code')">Code</span>
                    <span class="tag-ref" onclick="insertTag('image')">Image</span>
                    <span class="tag-ref" onclick="insertTag('video')">Video</span>
                    <span class="tag-ref" onclick="insertTag('audio')">Audio</span>
                    <span class="tag-ref" onclick="insertTag('list')">List</span>
                    <span class="tag-ref" onclick="insertTag('br')">Break</span>
                    <span class="tag-ref" onclick="document.getElementById('color-picker').click()" style="background:var(--accent); color:var(--accent-text);">Color Palette</span>
                </div>
                <div class="flex bg-gray-500/10 p-1 rounded-xl">
                    <button onclick="setMode('write')" id="btn-write" class="px-6 py-2 rounded-lg text-[10px] font-black uppercase transition-all">Write</button>
                    <button onclick="setMode('preview')" id="btn-preview" class="px-6 py-2 rounded-lg text-[10px] font-black uppercase transition-all">Preview</button>
                </div>
            </div>

            <div class="glass-card p-8 min-h-[700px] flex flex-col relative">
                <div class="mb-6">
                    <input type="text" id="doc-title" placeholder="Document Title..." class="font-black text-3xl bg-transparent border-none outline-none w-full tracking-tighter">
                    <span class="text-[9px] font-black text-[#ccff00] uppercase block mt-1 tracking-widest">Auto-saving to LocalStorage</span>
                </div>
                
                <textarea id="editor" spellcheck="false" placeholder="Start writing logic..." class="flex-1 w-full p-6 rounded-2xl outline-none font-mono text-sm leading-relaxed mb-4 resize-none min-h-[500px]"></textarea>
                
                <div id="preview-box" class="hidden flex-1 w-full p-6 rounded-2xl bg-transparent overflow-y-auto min-h-[500px]"></div>

                <div class="flex justify-end mt-4">
                    <button onclick="downloadNote()" class="btn-primary px-8 py-3 rounded-xl text-[10px] font-black">
                        DOWNLOAD .MD
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const editor = document.getElementById('editor');
        const titleInput = document.getElementById('doc-title');
        const root = document.documentElement;

        function changeTheme(theme) {
            localStorage.setItem('logic_theme', theme);
            if (theme === 'system') {
                const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                root.setAttribute('data-theme', prefersDark ? 'dark' : 'light');
            } else {
                root.setAttribute('data-theme', theme);
            }
        }

        window.onload = () => {
            const savedContent = localStorage.getItem('logic_content');
            const savedTitle = localStorage.getItem('logic_title');
            if (savedContent) editor.value = savedContent;
            if (savedTitle) titleInput.value = savedTitle;

            const savedTheme = localStorage.getItem('logic_theme') || 'dark';
            document.getElementById('theme-choice').value = savedTheme;
            changeTheme(savedTheme);
            setMode('write');
        };

        editor.addEventListener('input', () => localStorage.setItem('logic_content', editor.value));
        titleInput.addEventListener('input', () => localStorage.setItem('logic_title', titleInput.value));

        function setMode(mode) {
            const preview = document.getElementById('preview-box');
            const btnW = document.getElementById('btn-write');
            const btnP = document.getElementById('btn-preview');

            if(mode === 'preview') {
                editor.classList.add('hidden');
                preview.classList.remove('hidden');
                btnP.style.backgroundColor = 'var(--accent)';
                btnP.style.color = 'var(--accent-text)';
                btnW.style.backgroundColor = 'transparent';
                btnW.style.color = 'var(--text-muted)';
                renderPreview();
            } else {
                editor.classList.remove('hidden');
                preview.classList.add('hidden');
                btnW.style.backgroundColor = 'var(--accent)';
                btnW.style.color = 'var(--accent-text)';
                btnP.style.backgroundColor = 'transparent';
                btnP.style.color = 'var(--text-muted)';
            }
        }

        function renderPreview() {
            const preview = document.getElementById('preview-box');
            let text = editor.value;

            // UPDATED RENDERING LOGIC MATCHED TO GET-STARTED2.HTML
            text = text.replace(/<align type="(.*?)">([\s\S]*?)<\/align>/g, '<div style="text-align:$1">$2</div>');
            
            text = text.replace(/<heading size="(.*?)" align="(.*?)">([\s\S]*?)<\/heading>/g, (m, s, a, c) => {
                const sizeMap = {
                    1: '2.8rem', 2: '2.4rem', 3: '2.0rem', 
                    4: '1.8rem', 5: '1.6rem', 6: '1.4rem', 
                    7: '1.2rem', 8: '1.1rem', 9: '1.05rem', 10: '1rem'
                };
                const fontSize = sizeMap[s] || "1.2rem";
                const weight = s <= 3 ? '800' : '600';
                return `<div style="font-size:${fontSize}; text-align:${a}; font-weight:${weight}; margin:1.5rem 0 0.8rem 0; line-height:1.2; color:var(--text-main);">${c}</div>`;
            });

            text = text.replace(/<collapse heading="(.*?)" color="(.*?)" bg-color="(.*?)">([\s\S]*?)<\/collapse>/g, (m, h, c, bg, con) => {
                return `<details class="custom-collapse" style="border: 2px solid ${c}; background: ${bg}15;">
                            <summary style="color:${c}; font-weight:700;">${h}</summary>
                            <div class="collapse-body">${con}</div>
                        </details>`;
            });

            text = text.replace(/<tw state="(.*?)" color="(.*?)" type="(.*?)">([\s\S]*?)<\/tw>/g, (m, state, color, type, content) => {
                const b = type.includes('bold') ? 'bold' : 'normal', i = type.includes('italic') ? 'italic' : 'normal';
                return `<span class="tw-cursor" style="color:${color || 'inherit'}; font-weight:${b}; font-style:${i};">${content}</span>`;
            });

            text = text.replace(/<href(?: heading="(.*?)")?>([\s\S]*?)<\/href>/g, (m, h, l) => {
                const linkText = h || l.trim();
                return `<a href="${l.trim()}" class="custom-href" target="_blank">${linkText}</a>`;
            });

            text = text.replace(/<text color="(.*?)" type="(.*?)">([\s\S]*?)<\/text>/g, (m, color, type, content) => {
                let s = `color:${color || 'inherit'};`;
                if(type.includes('bold')) s += 'font-weight:bold;';
                if(type.includes('italic')) s += 'font-style:italic;';
                if(type.includes('underline')) s += 'text-decoration:underline;';
                return `<span style="${s}">${content}</span>`;
            });

            text = text.replace(/<list type="(.*?)">([\s\S]*?)<\/list>/g, (m, type, content) => {
                const tag = type === 'number' ? 'ol' : 'ul';
                return `<${tag} style="margin:15px 0 15px 40px; list-style-type: ${type === 'number' ? 'decimal' : 'disc'};">${content.trim().split('\n').map(i => `<li>${i.trim()}</li>`).join('')}</${tag}>`;
            });

            text = text.replace(/<box color="(.*?)"(?: type="(.*?)")?>([\s\S]*?)<\/box>/g, (m, c, t, con) => `<div class="logic-box" style="border-color:${c}; background:${c}15; border-style:${t === 'dotted' ? 'dotted' : 'solid'}">${con}</div>`);
            
            text = text.replace(/<code>([\s\S]*?)<\/code>/g, (m, code) => {
                const clean = code.trim();
                return `<div class="code-container"><button class="copy-btn">Copy</button><pre><code>${clean}</code></pre></div>`;
            });
            
            text = text.replace(/<image>(.*?)<\/image>/g, (m, n) => `<img src="${n.trim()}">`);
            text = text.replace(/<video>(.*?)<\/video>/g, (m, n) => `<video muted playsinline loop controls><source src="${n.trim()}" type="video/mp4"></video>`);
            text = text.replace(/<audio>(.*?)<\/audio>/g, (m, n) => `<audio controls src="${n.trim()}"></audio>`);
            text = text.replace(/<br>/g, '<br>');

            preview.innerHTML = marked.parse(text);
            
            document.querySelectorAll('.copy-btn').forEach(btn => btn.onclick = () => { 
                navigator.clipboard.writeText(btn.nextElementSibling.innerText); 
                btn.innerText = "COPIED"; 
                setTimeout(() => btn.innerText = "COPY", 2000); 
            });
        }

        function insertTag(type) {
            const start = editor.selectionStart;
            const end = editor.selectionEnd;
            const text = editor.value;
            const tags = {
                tw: '<tw state="active" color="#ccff00" type="bold">Text</tw>',
                box: '<box color="#ccff00" type="solid">Content</box>',
                collapse: '<collapse heading="Title" color="#ccff00" bg-color="#000000">Body</collapse>',
                heading: '<heading size="1" align="left">Headline</heading>',
                href: '<href heading="Link Title">https://link-url.com</href>',
                text: '<text color="#ccff00" type="bold italic underline">Styled Text</text>',
                align: '<align type="center">Content</align>',
                code: '<code>\nCode\n</code>',
                image: '<image>image_filename.png</image>',
                video: '<video>video_filename.mp4</video>',
                audio: '<audio>audio_filename.mp3</audio>',
                list: '<list type="bullet">\nitem 1\nitem 2\n</list>',
                br: '<br>'
            };
            editor.value = text.substring(0, start) + (tags[type] || '') + text.substring(end);
            localStorage.setItem('logic_content', editor.value);
            editor.focus();
        }

        function insertColor(color) {
            const start = editor.selectionStart;
            editor.value = editor.value.substring(0, start) + color + editor.value.substring(start);
            localStorage.setItem('logic_content', editor.value);
            editor.focus();
        }

        function clearStorage() {
            if(confirm("Delete everything? This cannot be undone.")) {
                localStorage.clear();
                location.reload();
            }
        }

        function downloadNote() {
            const blob = new Blob([editor.value], { type: 'text/markdown' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = (titleInput.value || 'note') + '.md';
            a.click();
        }
    </script>
</body>
</html>

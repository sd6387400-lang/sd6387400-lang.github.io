<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creations | Pratyush</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;500;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        :root {
            --bg-base: #f8f9ff;
            --card-bg: rgba(255, 255, 255, 0.7);
            --text-main: #1a1c1e;
            --text-dim: #44474e;
            --accent: #006494;
            --sidebar-bg: rgba(255, 255, 255, 0.98);
            --border: rgba(0, 0, 0, 0.05);
            --blob-1: #d0e4ff;
            --blob-2: #e1dfff;
            --btn-bg: #1a1c1e;
            --btn-text: #ffffff;
            --overlay: rgba(0, 0, 0, 0.2);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-base: #0f1115;
                --card-bg: rgba(26, 28, 30, 0.6);
                --text-main: #e2e2e6;
                --text-dim: #c4c6cf;
                --accent: #91cdff;
                --sidebar-bg: rgba(15, 17, 21, 0.98);
                --border: rgba(255, 255, 255, 0.08);
                --blob-1: #1e2a3d;
                --blob-2: #28224d;
                --btn-bg: #f8f9ff;
                --btn-text: #111318;
                --overlay: rgba(0, 0, 0, 0.6);
            }
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background-color: var(--bg-base); color: var(--text-main); min-height: 100vh; display: flex; flex-direction: column; overflow-x: hidden; }

        /* --- Optimized Background (Moving Circles) --- */
        .bg-wrapper { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; overflow: hidden; }
        
        .blob { 
            position: absolute; 
            width: 500px; 
            height: 500px; 
            border-radius: 50%; 
            opacity: 0.6; 
            pointer-events: none;
            /* Added smooth floating animation */
            animation: float 15s infinite ease-in-out alternate;
        }
        .blob-1 { background: var(--blob-1); top: -150px; left: -150px; }
        .blob-2 { 
            background: var(--blob-2); 
            bottom: -150px; 
            right: -150px; 
            animation-delay: -7s; /* Offsets the animation so they don't move in perfect sync */
            animation-duration: 18s;
        }

        /* Animation logic: Subtle drifting motion */
        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(60px, 40px) scale(1.05); }
            100% { transform: translate(-20px, 80px) scale(1); }
        }

        /* --- Sidebar & Overlay (No Blur/Lag) --- */
        #overlay { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: var(--overlay); 
            z-index: 999; 
            opacity: 0; 
            visibility: hidden; 
            transition: 0.3s ease; 
        }
        #overlay.active { opacity: 1; visibility: visible; }
        
        .menu-btn { position: fixed; top: 25px; left: 25px; z-index: 1001; background: var(--card-bg); border: 1px solid var(--border); padding: 12px; border-radius: 15px; cursor: pointer; backdrop-filter: blur(10px); }
        .sidebar { position: fixed; top: 0; left: -320px; width: 300px; height: 100vh; background: var(--sidebar-bg); z-index: 1000; padding: 100px 30px; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); border-right: 1px solid var(--border); }
        .sidebar.active { left: 0; }
        .sidebar-item { display: flex; align-items: center; gap: 15px; text-decoration: none; color: var(--text-dim); font-size: 1.1rem; font-weight: 600; margin-bottom: 20px; padding: 12px; border-radius: 12px; transition: 0.3s; }
        .sidebar-item:hover, .sidebar-item.active { background: var(--accent); color: var(--bg-base); }

        /* --- Search Bar --- */
        .search-container { position: fixed; top: 25px; right: 25px; z-index: 1001; display: flex; align-items: center; }
        #search-input {
            width: 0; opacity: 0; padding: 12px 0;
            border: 1px solid var(--border); border-radius: 15px;
            background: var(--card-bg); color: var(--text-main);
            backdrop-filter: blur(10px); outline: none;
            transition: all 0.4s ease;
        }
        #search-input.active { width: 250px; opacity: 1; padding: 12px 20px; margin-right: 10px; }
        .search-btn { background: var(--card-bg); border: 1px solid var(--border); padding: 12px; border-radius: 15px; cursor: pointer; backdrop-filter: blur(10px); }

        /* --- Grid --- */
        .content { padding: 120px 20px 60px; max-width: 1200px; margin: 0 auto; flex: 1; width: 100%; }
        header { text-align: center; margin-bottom: 60px; }
        header h1 { font-size: 3.5rem; font-weight: 800; letter-spacing: -2px; }
        #repo-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 25px; }

        .repo-card { background: var(--card-bg); backdrop-filter: blur(15px); border: 1px solid var(--border); border-radius: 30px; padding: 32px; cursor: pointer; display: flex; flex-direction: column; transition: 0.3s ease; }
        .repo-card.hidden { display: none; }
        .repo-card:hover { transform: translateY(-8px); border-color: var(--accent); }
        .repo-name { font-size: 1.4rem; font-weight: 700; margin-bottom: 12px; text-transform: capitalize; }
        .repo-desc { font-size: 0.95rem; color: var(--text-dim); line-height: 1.6; margin-bottom: 30px; flex-grow: 1; }
        .repo-footer { display: flex; flex-wrap: wrap; gap: 10px; justify-content: space-between; align-items: center; }
        .btn-group { display: flex; gap: 8px; }
        .action-btn { text-decoration: none; background: var(--btn-bg); color: var(--btn-text); padding: 8px 16px; border-radius: 50px; font-size: 0.8rem; font-weight: 700; transition: 0.3s; display: flex; align-items: center; gap: 6px; }
        .action-btn.secondary { background: transparent; border: 1.5px solid var(--btn-bg); color: var(--btn-bg); }
        .action-btn:hover { opacity: 0.7; }

        footer { text-align: center; padding: 40px; color: var(--text-dim); font-weight: 500; font-size: 0.9rem; }
    </style>
</head>
<body>

    <div class="bg-wrapper">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div id="overlay" onclick="toggleSidebar()"></div>
    
    <div class="menu-btn" onclick="toggleSidebar()"><i data-lucide="menu"></i></div>
    
    <div class="search-container">
        <input type="text" id="search-input" placeholder="Search creations..." oninput="filterRepos()">
        <div class="search-btn" onclick="toggleSearch()"><i data-lucide="search"></i></div>
    </div>

    <nav class="sidebar" id="sidebar">
        <a href="index.html" class="sidebar-item"><i data-lucide="home"></i> Home</a>
        <a href="creations.html" class="sidebar-item active"><i data-lucide="layout-template"></i> Creations</a>
        <a href="https://github.com/sd6387400-lang" target="_blank" class="sidebar-item"><i data-lucide="github"></i> GitHub</a>
    </nav>

    <div class="content">
        <header>
            <h1>Creations</h1>
            <p style="color: var(--text-dim);">The dynamic library of my logic.</p>
        </header>
        <div id="repo-container"></div>
    </div>

    <footer>Made with ❤️ Love by Pratyush</footer>

    <script>
        lucide.createIcons();

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
        }

        function toggleSearch() {
            const input = document.getElementById('search-input');
            input.classList.toggle('active');
            if(input.classList.contains('active')) input.focus();
        }

        function filterRepos() {
            const query = document.getElementById('search-input').value.toLowerCase();
            const cards = document.querySelectorAll('.repo-card');
            cards.forEach(card => {
                const name = card.querySelector('.repo-name').innerText.toLowerCase();
                const desc = card.querySelector('.repo-desc').innerText.toLowerCase();
                if(name.includes(query) || desc.includes(query)) {
                    card.classList.remove('hidden');
                } else {
                    card.classList.add('hidden');
                }
            });
        }

        const username = "sd6387400-lang";
        const hiddenRepos = ["sd6387400-lang.github.io", "config"];

        async function fetchRepos() {
            try {
                const response = await fetch(`https://api.github.com/users/${username}/repos?sort=updated`);
                const repos = await response.json();
                const container = document.getElementById('repo-container');
                container.innerHTML = '';

                repos.forEach(repo => {
                    if (!hiddenRepos.includes(repo.name) && !repo.fork) {
                        const card = document.createElement('div');
                        card.className = 'repo-card';
                        card.setAttribute('onclick', `window.open('https://${username}.github.io/${repo.name}/', '_blank')`);

                        card.innerHTML = `
                            <div class="repo-name">${repo.name.replace(/-/g, ' ')}</div>
                            <p class="repo-desc">${repo.description || 'Exploring code and creativity.'}</p>
                            <div class="repo-footer">
                                <span style="font-size:0.75rem; font-weight:bold; color:var(--accent)">${repo.language || 'Code'}</span>
                                <div class="btn-group">
                                    <a href="${repo.html_url}" target="_blank" class="action-btn" onclick="event.stopPropagation();">
                                        <i data-lucide="code-2" style="width:14px"></i> Code
                                    </a>
                                    <a href="${repo.html_url}/releases" target="_blank" class="action-btn secondary" onclick="event.stopPropagation();">
                                        <i data-lucide="package" style="width:14px"></i> Releases
                                    </a>
                                </div>
                            </div>
                        `;
                        container.appendChild(card);
                    }
                });
                lucide.createIcons();
            } catch (e) { container.innerHTML = '<p>Error loading.</p>'; }
        }
        fetchRepos();
    </script>
</body>
</html>

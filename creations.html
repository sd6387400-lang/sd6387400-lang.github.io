<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creations | Pratyush</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;500;700;800&family=Nunito:wght@300;500;700;800;900&family=Bricolage+Grotesque:opsz,wght@12..96,300;12..96,500;12..96,700;12..96,800&family=Syne:wght@400;500;700;800&family=Figtree:wght@300;500;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* ── M3 Easing vars ── */
        :root {
            --spring:      cubic-bezier(0.34, 1.56, 0.64, 1);
            --spring-soft: cubic-bezier(0.22, 1.4, 0.36, 1);
            --m3-decel:    cubic-bezier(0.05, 0.7, 0.1, 1.0);
            --m3-standard: cubic-bezier(0.2, 0, 0, 1);
            --m3-accel:    cubic-bezier(0.3, 0, 1, 1);
            --font-main:   'Nunito', sans-serif;
            --font-mono:   'JetBrains Mono', monospace;
            --bg-base:    #FFF8EE;
            --card-bg:    rgba(255,251,235,0.78);
            --text-main:  #1E1200;
            --text-dim:   #6B4A1A;
            --accent:     #A06800;
            --accent-text: #A06800;
            --accent-rgb: 160,104,0;
            --accent1:    #A06800;
            --accent2:    #7EC8E3;
            --accent3:    #5BAD72;
            --sidebar-bg: rgba(255,252,240,0.98);
            --border:     rgba(160,104,0,0.13);
            --shape1:     #F2C94C;
            --shape1h:    #F7D96A;
            --shape1s:    #D4A800;
            --shape2:     #7EC8E3;
            --shape2h:    #A8DCF0;
            --shape2s:    #4FA8C8;
            --shape3:     #5BAD72;
            --shape3s:    #3D9050;
        }

        /* ── Reset ── */
        * { margin:0; padding:0; box-sizing:border-box; font-family: var(--font-main); -webkit-tap-highlight-color:transparent; }
        *:focus { outline:none; }

        body { background:var(--bg-base); color:var(--text-main); min-height:100vh; overflow-x:hidden; transition:background 0.5s, color 0.5s; }

        /* ══════════════════════════════════════════════
           BACKGROUND STYLES
        ══════════════════════════════════════════════ */
        .bg-wrapper { position:fixed; inset:0; z-index:-1; pointer-events:none; transition: opacity 0.5s, filter 0.5s; overflow:hidden; }
        .bg-shape { position:absolute; pointer-events:none; transition:background 0.6s, border-color 0.6s, opacity 0.5s; }
        
        body[data-bg="1"] .bg-wrapper::after { content:''; position:absolute; inset:0; background-image:radial-gradient(circle,rgba(var(--accent-rgb),0.07) 1px,transparent 1px); background-size:28px 28px; }
        body[data-bg="1"] .bg-shape { border-radius:50%; }
        body[data-bg="1"] .bg-s1  { width:clamp(180px,38vmax,500px); height:clamp(180px,38vmax,500px); top:-12%; left:-10%; }
        body[data-bg="1"] .bg-s1r { width:clamp(220px,46vmax,600px); height:clamp(220px,46vmax,600px); top:-15%; left:-13%; background:transparent!important; border:6px solid var(--shape1s); opacity:0.22; }
        body[data-bg="1"] .bg-s2  { width:clamp(160px,34vmax,460px); height:clamp(180px,38vmax,500px); top:-8%; right:-8%; border-radius:50% 55% 50% 55% / 55% 50% 55% 50%; }
        body[data-bg="1"] .bg-s2r { width:clamp(200px,42vmax,560px); height:clamp(220px,46vmax,600px); top:-12%; right:-12%; background:transparent!important; border:5px solid var(--shape2s); opacity:0.18; border-radius:50% 55% 50% 55% / 55% 50% 55% 50%; }
        body[data-bg="1"] .bg-s3  { width:clamp(70px,14vmax,190px); height:clamp(45px,9vmax,115px); bottom:10%; left:-3%; transform:rotate(-20deg); opacity:0.52; }
        body[data-bg="1"] .bg-s4  { width:clamp(80px,13vmax,180px); height:clamp(80px,13vmax,180px); bottom:5%; right:1%; opacity:0.42; }
        body[data-bg="1"] .bg-s4r { width:clamp(100px,17vmax,220px); height:clamp(100px,17vmax,220px); bottom:3%; right:-1%; background:transparent!important; border:4px solid var(--shape1s); opacity:0.16; }
        body[data-bg="1"] .bg-s5  { width:clamp(50px,9vmax,140px); height:clamp(35px,6vmax,90px); top:42%; right:-2%; opacity:0.30; transform:rotate(15deg); }
        .m3-sq { position:absolute; pointer-events:none; transition:fill 0.6s; display:none; }
        body[data-bg="1"] .m3-sq { display:block; }
        .m3-sq-a { width:clamp(60px,10vmax,140px); bottom:28%; left:4%; opacity:0.12; }
        .m3-sq-b { width:clamp(40px,7vmax,90px);  top:38%; right:6%; opacity:0.10; }
        .m3-sq-c { width:clamp(30px,5vmax,70px);  bottom:12%; right:22%; opacity:0.08; }

        body[data-bg="2"] .bg-wrapper { background-image: linear-gradient(rgba(var(--accent-rgb),0.1) 2px, transparent 2px), linear-gradient(90deg, rgba(var(--accent-rgb),0.1) 2px, transparent 2px), linear-gradient(rgba(var(--accent-rgb),0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(var(--accent-rgb),0.05) 1px, transparent 1px); background-size: 100px 100px, 100px 100px, 20px 20px, 20px 20px; }
        body[data-bg="2"] .bg-shape { display:none; }
        body[data-bg="3"] .bg-wrapper { background-image: radial-gradient(rgba(var(--accent-rgb), 0.5) 2px, transparent 2.5px); background-size: 32px 32px; opacity: 0.7; }
        body[data-bg="3"] .bg-shape { display:none; }
        body[data-bg="4"] .bg-wrapper { background: repeating-linear-gradient( -45deg, transparent, transparent 15px, rgba(var(--accent-rgb), 0.08) 15px, rgba(var(--accent-rgb), 0.08) 30px ); opacity: 0.9; }
        body[data-bg="4"] .bg-shape { display:none; }
        body[data-bg="5"] .bg-wrapper { background: radial-gradient(circle at 10% 0%, rgba(var(--accent-rgb), 0.15) 0%, transparent 60%); }
        body[data-bg="5"] .bg-shape { display:none; }
        body[data-bg="6"] .bg-wrapper { opacity: 0.85; }
        body[data-bg="6"] .bg-s1 { width: 45vw; height: 120vh; top: -10%; left: -20%; opacity: 0.12; border-radius: 0; transform: rotate(15deg); }
        body[data-bg="6"] .bg-s2 { width: 60vw; height: 50vh; bottom: -10%; right: -10%; opacity: 0.08; border-radius: 0; transform: rotate(-25deg); }
        body[data-bg="6"] .bg-s3 { width: 30vw; height: 30vw; top: 10%; right: 15%; opacity: 0.15; border-radius: 0; transform: rotate(45deg); }
        body[data-bg="6"] .bg-s4, body[data-bg="6"] .bg-s5, body[data-bg="6"] .bg-s1r, body[data-bg="6"] .bg-s2r, body[data-bg="6"] .bg-s4r { display:none; }

        body.dark-mode .bg-s1  { opacity:0.25; }
        body.dark-mode .bg-s1r { opacity:0.10; }
        body.dark-mode .bg-s2  { opacity:0.20; }
        body.dark-mode .bg-s2r { opacity:0.08; }
        body.dark-mode .bg-s3  { opacity:0.22; }
        body.dark-mode .bg-s4  { opacity:0.18; }
        body.dark-mode .bg-s4r { opacity:0.08; }
        body.dark-mode .bg-s5  { opacity:0.15; }
        body.dark-mode .m3-sq-a { opacity:0.07; }
        body.dark-mode .m3-sq-b { opacity:0.06; }
        body.dark-mode .m3-sq-c { opacity:0.05; }
        body.dark-mode[data-bg="2"] .bg-wrapper { opacity: 0.35; }
        body.dark-mode[data-bg="6"] .bg-s1 { opacity: 0.06; }
        body.dark-mode[data-bg="6"] .bg-s2 { opacity: 0.04; }
        body.dark-mode[data-bg="6"] .bg-s3 { opacity: 0.07; }

        @keyframes floatA { 0%,100%{transform:translate(0,0) rotate(0deg)} 50%{transform:translate(10px,16px) rotate(4deg)} }
        @keyframes floatB { 0%,100%{transform:translate(0,0) rotate(0deg)} 50%{transform:translate(-12px,-8px) rotate(-5deg)} }
        @keyframes floatE { 0%,100%{transform:translate(0,0)} 50%{transform:translate(5px,-7px)} }
        @keyframes m3FloatSq { 0%,100% { transform:translateY(0) rotate(0deg) scale(1); } 30% { transform:translateY(-18px) rotate(12deg) scale(1.06); } 70% { transform:translateY(8px) rotate(-7deg) scale(0.96); } }
        @keyframes m3FloatSqB { 0%,100% { transform:translateY(0) rotate(15deg) scale(1); } 40% { transform:translateY(12px) rotate(25deg) scale(1.08); } 70% { transform:translateY(-10px) rotate(5deg) scale(0.94); } }
        @keyframes m3FloatSqC { 0%,100% { transform:translateY(0) rotate(-10deg) scale(1); } 50% { transform:translateY(-14px) rotate(-20deg) scale(1.1); } }
        .sh-a { animation:floatA  9s ease-in-out infinite; }
        .sh-b { animation:floatB 12s ease-in-out infinite; }
        .sh-e { animation:floatE  6s ease-in-out infinite; }
        .sq-a { animation:m3FloatSq  11s ease-in-out infinite; }
        .sq-b { animation:m3FloatSqB 14s ease-in-out infinite; }
        .sq-c { animation:m3FloatSqC  8s ease-in-out infinite; }
        .bg-s1r,.bg-s2r,.bg-s4r, body[data-bg="6"] .bg-shape { animation:none!important; }

        /* ── Loaders ── */
        #loader { position:fixed; inset:0; z-index:9999; background:var(--bg-base); display:flex; align-items:center; justify-content:center; flex-direction:column; gap:20px; pointer-events:all; transition:opacity 0.4s ease; }
        #loader.fade-out { opacity:0; pointer-events:none; }
        .loader-variant { display: none; align-items:center; justify-content:center; flex-direction:column; gap:15px; }

        body[data-loader="1"] .loader-v1 { display: flex; }
        body[data-loader="2"] .loader-v2 { display: flex; }
        body[data-loader="3"] .loader-v3 { display: flex; }
        body[data-loader="4"] .loader-v4 { display: flex; }
        body[data-loader="5"] .loader-v5 { display: flex; }
        body[data-loader="6"] .loader-v6 { display: flex; }

        .loader-squircle-wrap { position:relative; width:80px; height:80px; }
        .loader-squircle-bg { position:absolute; inset:0; background:rgba(var(--accent-rgb),0.08); clip-path:url(#squircle-clip); animation:loaderSqPulse 2s ease-in-out infinite; }
        @keyframes loaderSqPulse { 0%,100% { transform:scale(1); opacity:0.08; } 50% { transform:scale(1.1); opacity:0.15; } }
        .loader-ring { position:absolute; inset:0; border-radius:50%; border:3px solid transparent; border-top-color:var(--accent); animation:spinRing 1s cubic-bezier(0.6,0.2,0.4,0.9) infinite; }
        .loader-ring:nth-child(3) { inset:10px; border-top-color:transparent; border-right-color:var(--shape2); animation-duration:1.3s; animation-direction:reverse; }
        .loader-ring:nth-child(4) { inset:22px; border-top-color:var(--shape3); border-right-color:transparent; animation-duration:0.8s; }
        .loader-dot { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:10px; height:10px; border-radius:50%; background:var(--accent); animation:dotPulse 1s ease-in-out infinite alternate; }
        @keyframes spinRing { to { transform:rotate(360deg); } }
        @keyframes dotPulse { from{transform:translate(-50%,-50%) scale(0.7);opacity:0.5} to{transform:translate(-50%,-50%) scale(1.2);opacity:1} }
        
        .loader-v2 .dots { display:flex; gap:10px; }
        .loader-v2 .d { width:14px; height:14px; border-radius:50%; background:var(--accent); animation:l2bounce 0.6s infinite alternate cubic-bezier(0.34, 1.56, 0.64, 1); }
        .loader-v2 .d:nth-child(2) { background:var(--shape2); animation-delay: 0.15s; } 
        .loader-v2 .d:nth-child(3) { background:var(--shape3); animation-delay: 0.3s; }
        @keyframes l2bounce { from { transform:translateY(10px) scale(0.9); opacity:0.6; } to { transform:translateY(-10px) scale(1.1); opacity:1; } }

        .loader-v3 .loader-m3-bar { margin-top: 15px; }
        .loader-v4 .pulse-ring { position:relative; width:60px; height:60px; }
        .loader-v4 .p-ring { position:absolute; inset:0; border:4px solid var(--accent); border-radius:50%; opacity:0; animation:l4pulse 1.8s cubic-bezier(0.165, 0.84, 0.44, 1) infinite; }
        .loader-v4 .p-ring:nth-child(2) { animation-delay:-0.9s; border-color:var(--shape2); }
        @keyframes l4pulse { 0% { transform:scale(0.1); opacity:1; } 100% { transform:scale(1.5); opacity:0; } }

        .loader-m3-bar { width:120px; height:4px; background:rgba(var(--accent-rgb),0.15); border-radius:2px; overflow:hidden; }
        .loader-m3-bar-fill { height:100%; background:var(--accent); border-radius:2px; animation:loaderBarFill 1.5s var(--m3-standard) infinite; }
        @keyframes loaderBarFill { 0% { margin-left:-50%; width:50%; } 50% { margin-left:80%; width:60%; } 100% { margin-left:110%; width:20%; } }

        .loader-v6 .orbit-wrap { position:relative; width:50px; height:50px; border-radius:50%; border:2px solid rgba(var(--accent-rgb),0.1); display:flex; align-items:center; justify-content:center; }
        .loader-v6 .orbit-core { width:12px; height:12px; background:var(--accent); border-radius:50%; box-shadow:0 0 10px rgba(var(--accent-rgb),0.5); }
        .loader-v6 .orbit-moon { position:absolute; width:100%; height:100%; animation:spinRing 1.5s linear infinite; }
        .loader-v6 .orbit-moon::after { content:''; position:absolute; top:-5px; left:50%; transform:translateX(-50%); width:10px; height:10px; background:var(--shape2); border-radius:50%; }

        /* ── Overlay / Menu ── */
        #overlay-ui { position:fixed; inset:0; background:rgba(0,0,0,0.4); z-index:998; opacity:0; visibility:hidden; transition:0.3s; }
        #overlay-ui.active { opacity:1; visibility:visible; }
        #palette-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.4); z-index:1004; opacity:0; visibility:hidden; transition:0.4s var(--m3-decel); }
        #palette-overlay.active { opacity:1; visibility:visible; }

        .menu-btn { position:fixed; bottom:30px; left:30px; z-index:997; background:var(--accent); color:white; border:none; padding:15px; border-radius:50%; cursor:pointer; box-shadow:0 10px 25px rgba(0,0,0,0.2); display:none; transition:transform 0.35s var(--spring), background 0.3s; }
        .menu-btn:hover { transform:scale(1.12); }
        .menu-btn:active { transform:scale(0.92); }
        @media(max-aspect-ratio:1/1) { .menu-btn { display:block; } }

        /* ── Sidebar Styles ── */
        .sidebar { position:fixed; top:0; left:-320px; width:300px; height:100vh; background:var(--sidebar-bg); z-index:1000; padding:40px 20px; transition:left 0.4s var(--m3-decel), border 0.3s, background 0.3s, margin 0.3s, border-radius 0.3s, box-shadow 0.3s; border-right:1px solid var(--border); overflow-y:auto; scrollbar-width:thin; scrollbar-color:rgba(var(--accent-rgb),0.2) transparent; }
        body[data-sidebar="2"] .sidebar { border-right: 1px solid var(--border); background-color: var(--sidebar-bg); background-image: radial-gradient(circle at 10% 10%, rgba(var(--accent-rgb), 0.15) 0%, transparent 40%), radial-gradient(circle at 90% 90%, rgba(var(--accent-rgb), 0.15) 0%, transparent 40%); }
        body[data-sidebar="3"] .sidebar { background-color: var(--sidebar-bg); background-image: radial-gradient(rgba(var(--accent-rgb), 0.25) 1px, transparent 1px); background-size: 14px 14px; border-right: 1px solid var(--border); }
        @media(min-aspect-ratio:1/1) {
            body[data-sidebar="3"] .sidebar { height: calc(100vh - 40px); margin: 20px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.06); }
        }
        body[data-sidebar="4"] .sidebar { background-color: var(--sidebar-bg); background-image: linear-gradient(rgba(var(--accent-rgb),0.06) 1px, transparent 1px), linear-gradient(90deg, rgba(var(--accent-rgb),0.06) 1px, transparent 1px); background-size: 20px 20px; border-right: 2px solid var(--border); }
        body[data-sidebar="4"] .sidebar-link.active { background: var(--bg-base); color: var(--accent); border-left: 4px solid var(--accent); border-radius: 0 10px 10px 0; padding-left:18px; box-shadow: 2px 2px 10px rgba(0,0,0,0.05); }
        body[data-sidebar="5"] .sidebar { background-color: rgba(var(--accent-rgb), 0.02); background-image: radial-gradient(ellipse at 50% -20%, rgba(var(--accent-rgb), 0.15) 0%, transparent 60%), radial-gradient(ellipse at 50% 120%, rgba(var(--accent-rgb), 0.15) 0%, transparent 60%); border-right: 1px solid rgba(var(--accent-rgb), 0.1); background-attachment: fixed; }
        body.dark-mode[data-sidebar="5"] .sidebar { background-color: rgba(var(--accent-rgb), 0.05); border-right: 1px solid rgba(var(--accent-rgb), 0.15); }
        body[data-sidebar="6"] .sidebar { background-color: var(--bg-base); background-image: repeating-linear-gradient(-45deg, transparent, transparent 10px, rgba(var(--accent-rgb), 0.03) 10px, rgba(var(--accent-rgb), 0.03) 20px); border-right: 3px solid var(--border); }
        body[data-sidebar="6"] .sidebar-link.active { background: var(--text-main); color: var(--bg-base); }

        body.dark-mode .sidebar { border-right-color:rgba(255,255,255,0.07); box-shadow:4px 0 24px rgba(0,0,0,0.4); }
        @media(min-aspect-ratio:1/1) { .sidebar { left:0!important; } .menu-btn { display:none!important; } #overlay-ui { display:none!important; } }
        @media(max-aspect-ratio:1/1) { .sidebar.active { left:0; } }

        /* ── Search ── */
        .search-container { margin-bottom:20px; position:relative; }
        .search-input-wrap { position:relative; display:flex; align-items:center; }
        .search-icon-btn { position:absolute; left:0; top:0; bottom:0; width:42px; display:flex; align-items:center; justify-content:center; cursor:pointer; z-index:2; color:var(--accent); transition:color 0.2s, opacity 0.3s; background:none; border:none; }
        .search-icon-btn:hover { color:var(--text-main); }
        .search-input { width:100%; padding:12px 15px 12px 42px; border-radius:14px; border:2px solid var(--border); background:var(--card-bg); color:var(--text-main); font-size:0.88rem; transition:border-color 0.25s, box-shadow 0.25s; font-weight:500; }
        .search-input:focus { border-color:var(--accent); animation:searchPulse 2s ease-in-out infinite; }
        .search-input::placeholder { color:var(--text-dim); opacity:0.6; }
        @keyframes searchPulse { 0%,100%{ box-shadow:0 0 0 3px rgba(var(--accent-rgb),0.15); } 50% { box-shadow:0 0 0 6px rgba(var(--accent-rgb),0.07); } }

        /* ── Sidebar Links ── */
        .sidebar-link { padding:10px 14px 10px 22px; color:var(--text-dim); cursor:pointer; border-radius:10px; margin-bottom:3px; transition:background 0.2s, color 0.2s, transform 0.2s var(--spring); font-weight:600; display:flex; align-items:center; gap:10px; font-size:0.85rem; position:relative; }
        .sidebar-link::before { content:''; position:absolute; left:8px; top:50%; width:6px; height:1.5px; background:rgba(var(--accent-rgb),0.3); border-radius:2px; transform:translateY(-50%); transition:width 0.2s var(--spring), opacity 0.2s, background 0.2s; }
        .sidebar-link:hover { background:rgba(var(--accent-rgb),0.08); color:var(--accent-text); transform:translateX(3px); }
        .sidebar-link:hover::before { width:8px; opacity:0.7; background:var(--accent); }
        .sidebar-link.active { background:var(--accent); color:white; transform:translateX(0); }
        .sidebar-link.active::before { background:rgba(255,255,255,0.5); width:6px; }

        /* ── Main content ── */
        .container { padding:60px 20px; max-width:1200px; margin:0 auto; width:100%; position:relative; z-index:1; }
        @media(min-aspect-ratio:1/1) { 
            .container { margin-left: 300px; max-width: calc(100% - 300px); padding: 60px 40px; }
            body[data-sidebar="3"] .container { margin-left: 340px; max-width: calc(100% - 340px); }
        }
        @media(max-aspect-ratio:1/1) {
            .container { padding: 20px 10px !important; }
        }

        /* ── Header ── */
        .page-header { text-align:left; margin-bottom:52px; padding:0 4px; }
        .header-eyebrow { font-size:0.7rem; letter-spacing:0.18em; text-transform:uppercase; color:var(--accent-text); font-weight:800; margin-bottom:10px; opacity:0.8; display:flex; align-items:center; gap:8px; }
        .header-eyebrow::before { content:''; display:block; width:22px; height:2px; background:var(--accent); border-radius:2px; }
        .header-title { font-size:clamp(2.8rem,8vw,4.5rem); font-weight:800; letter-spacing:-2.5px; line-height:1.0; color:var(--text-main); }
        .header-title .title-accent { color:var(--accent-text); display:inline-block; }
        .header-sub { margin-top:14px; font-size:1rem; color:var(--text-dim); font-weight:500; max-width:420px; }
        .header-eyebrow { opacity:0; transform:translateX(-14px); animation:slideRight 0.6s var(--m3-decel) 0.05s forwards; }
        .header-title { opacity:0; transform:translateY(32px); animation:headingRise 0.8s var(--m3-decel) 0.15s forwards; }
        .header-sub { opacity:0; transform:translateY(16px); animation:headingRise 0.7s var(--m3-decel) 0.38s forwards; }
        @keyframes headingRise { to { opacity:1; transform:translateY(0); } }
        @keyframes slideRight  { to { opacity:0.8; transform:translateX(0); } }

        /* ── Repo Cards ── */
        .repo-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:24px; }
        .repo-card { background:var(--card-bg); border:1.5px solid var(--border); border-radius:28px; padding:36px 32px; cursor:pointer; backdrop-filter:blur(16px); text-align:left; opacity:0; transform:translateY(32px) scale(0.96); animation:cardEntrance 0.7s var(--m3-decel) var(--delay,0.5s) forwards; transition:transform 0.4s var(--spring), border-color 0.3s, box-shadow 0.3s; position:relative; overflow:hidden; display:flex; flex-direction:column; }
        .repo-card::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; background:linear-gradient(90deg,var(--accent1),var(--accent2),var(--accent3)); transform:scaleX(0); transform-origin:left; transition:transform 0.4s var(--spring); border-radius:3px 3px 0 0; }

/* ═══════════════════════════════════════════════
   SMART TEXT CONTRAST LOGIC
═══════════════════════════════════════════════ */
function adjustHex(hex, amount) {
    if(!hex) return '#000000';
    let c = hex.replace(/^#/, '');
    if (c.length === 3) c = c.split('').map(x=>x+x).join('');
    let r = parseInt(c.substring(0,2), 16) + amount;
    let g = parseInt(c.substring(2,4), 16) + amount;
    let b = parseInt(c.substring(4,6), 16) + amount;
    r = Math.max(0, Math.min(255, r)); g = Math.max(0, Math.min(255, g)); b = Math.max(0, Math.min(255, b));
    return `#${r.toString(16).padStart(2,'0')}${g.toString(16).padStart(2,'0')}${b.toString(16).padStart(2,'0')}`;
}

function getReadableAccent(hex, isDarkTheme) {
    if(!hex || !hex.startsWith('#')) return hex;
    let c = hex.replace(/^#/, '');
    if (c.length === 3) c = c.split('').map(x=>x+x).join('');
    let r = parseInt(c.substring(0,2), 16);
    let g = parseInt(c.substring(2,4), 16);
    let b = parseInt(c.substring(4,6), 16);
    let yiq = ((r*299)+(g*587)+(b*114))/1000;
    
    if (!isDarkTheme) return adjustHex(hex, -100); 
    else if (isDarkTheme && yiq < 120) return adjustHex(hex, 80);
    return hex; 
}

function setPref(type, val) {
    localStorage.setItem('pref' + type.charAt(0).toUpperCase() + type.slice(1), val);
    document.body.setAttribute(`data-${type}`, val);
    if(type==='bg') prefBg = val;
    if(type==='sidebar') prefSidebar = val;
    if(type==='loader') prefLoader = val;
    updatePrefUI();
}
function updatePrefUI() {
    const act = (id, v) => { document.querySelectorAll(`#${id} .pp-opt-btn`).forEach((b,i) => b.classList.toggle('active', i+1 == v)); };

}

function computeIsDark() {
    if (themeMode === 'dark')  return true;

    return window.matchMedia('(prefers-color-scheme: dark)').matches;
}

function applyPalette(idx) {
    const p = PALETTES[idx]; const v = isDark ? p.dark : p.light; const r = document.documentElement.style;
    
    let tCol = v.text;
    if (customAccents && customAccents.slot !== undefined && customAccents.text) {
        tCol = customAccents.text;
    }

    r.setProperty('--bg-base', v.bg); r.setProperty('--card-bg', v.card); r.setProperty('--text-main', tCol); r.setProperty('--text-dim', v.dim); r.setProperty('--sidebar-bg', v.sidebar); r.setProperty('--border', v.border);
    
    const a1 = customAccents ? customAccents.a1 : v.a1; const a2 = customAccents ? customAccents.a2 : v.a2; const a3 = customAccents ? customAccents.a3 : v.a3;
    r.setProperty('--accent1', a1); r.setProperty('--accent2', a2); r.setProperty('--accent3', a3);

    r.setProperty('--shape1', customAccents ? a1 : v.s1); r.setProperty('--shape1h', customAccents ? a1 : (v.s1h || v.s1)); r.setProperty('--shape1s', customAccents ? a1 : (v.s1s || v.s1));
    r.setProperty('--shape2', customAccents ? a2 : v.s2); r.setProperty('--shape2h', customAccents ? a2 : (v.s2h || v.s2)); r.setProperty('--shape2s', customAccents ? a2 : (v.s2s || v.s2));
    r.setProperty('--shape3', customAccents ? a3 : v.s3); r.setProperty('--shape3s', customAccents ? a3 : (v.s3s || v.s3));

    const set = (id, col) => { const el=document.getElementById(id); if(el) el.style.background=col; };
    set('s1a', customAccents ? a1 : v.s1); set('s2a', customAccents ? a2 : v.s2); set('s3a', customAccents ? a3 : v.s3); set('s4a', customAccents ? a1 : v.s1); set('s5a', customAccents ? a2 : v.s2);
    
    const setB = (id, col) => { const el=document.getElementById(id); if(el) el.style.borderColor=col; };
    setB('s1r', customAccents ? a1 : (v.s1s||v.s1)); setB('s2r', customAccents ? a2 : (v.s2s||v.s2)); setB('s4r', customAccents ? a1 : (v.s1s||v.s1));
    
    const setSvg = (id, col) => { const el=document.getElementById(id); if(el) el.style.fill=col; };
    setSvg('sq-a', customAccents ? a3 : (v.s3||v.s1)); setSvg('sq-b', customAccents ? a2 : (v.s2||v.s2)); setSvg('sq-c', customAccents ? a1 : (v.s1||v.s3));

    document.body.classList.toggle('dark-mode', isDark); applyActiveAccent(activeAccentN, a1, a2, a3);

    document.getElementById('acc-sw-1').style.background = a1; document.getElementById('acc-sw-2').style.background = a2; document.getElementById('acc-sw-3').style.background = a3;
    ['acc-sw-1','acc-sw-2','acc-sw-3'].forEach((id,i) => document.getElementById(id).classList.toggle('active', i+1 === activeAccentN));
    ['system','light','dark'].forEach(m => document.getElementById('theme-'+m)?.classList.toggle('active', themeMode === m));
    buildPalettePanel(); lucide.createIcons();
}

function applyActiveAccent(n, a1, a2, a3) {
    const cols = { 1:a1, 2:a2, 3:a3 }; const col = cols[n] || a1; let r2=160, g2=104, b2=0;
    try { [r2,g2,b2] = hexToRgb(col); } catch(e){}
    
    document.documentElement.style.setProperty('--accent', col); 
    document.documentElement.style.setProperty('--accent-rgb', `${r2},${g2},${b2}`);

    if (customAccents && customAccents.text && customAccents.slot !== undefined) {
        document.documentElement.style.setProperty('--accent-text', customAccents.text);
    } else {
        document.documentElement.style.setProperty('--accent-text', getReadableAccent(col, isDark));
    }

    activeAccentN = n; localStorage.setItem('activeAccent', n);
    ['acc-sw-1','acc-sw-2','acc-sw-3'].forEach((id,i) => document.getElementById(id)?.classList.toggle('active', i+1 === n));
}

function setActiveAccent(n) {
    const p = PALETTES[palIdx]; const v = isDark ? p.dark : p.light;
    const a1 = customAccents ? customAccents.a1 : v.a1; const a2 = customAccents ? customAccents.a2 : v.a2; const a3 = customAccents ? customAccents.a3 : v.a3;
    applyActiveAccent(n, a1, a2, a3);
}
function setThemeMode(mode) { themeMode = mode; localStorage.setItem('themeMode', mode); isDark = computeIsDark(); applyPalette(palIdx); }
function hexToRgb(hex) { hex = hex.replace('#',''); if(hex.length === 3) hex = hex.split('').map(c=>c+c).join(''); const i = parseInt(hex, 16); return [(i>>16)&255, (i>>8)&255, i&255]; }

/* ── Custom Font Upload ── */
document.getElementById('custom-font-upload').addEventListener('change', async (e) => {
    const file = e.target.files[0]; if(!file) return;
    try {
        const buffer = await file.arrayBuffer(); const font = new FontFace('CustomUserFont', buffer);
        await font.load(); document.fonts.add(font); document.documentElement.style.setProperty('--font-main', 'CustomUserFont'); activeFontId = 'custom';
        const reader = new FileReader();
        reader.onload = function(evt) { try { localStorage.setItem('customFontBase64', evt.target.result); localStorage.setItem('fontId', 'custom'); buildFontPicker(); } catch(err) {} };
        reader.readAsDataURL(file);
    } catch(err) {}
});

function restoreCustomFont() {
    const base64 = localStorage.getItem('customFontBase64');
    if(base64 && activeFontId === 'custom') { const font = new FontFace('CustomUserFont', `url(${base64})`); font.load().then(f => { document.fonts.add(f); document.documentElement.style.setProperty('--font-main', 'CustomUserFont'); }).catch(e=>{}); }
}

function setFont(id) {
    if(id === 'custom') { restoreCustomFont(); activeFontId = id; localStorage.setItem('fontId', id); buildFontPicker(); return; }
    const f = FONTS.find(f => f.id === id); if(!f) return;
    document.documentElement.style.setProperty('--font-main', f.family); activeFontId = id; localStorage.setItem('fontId', id); buildFontPicker();
}

function buildFontPicker() {
    const grid = document.getElementById('pp-font-grid'); if(!grid) return; grid.innerHTML = '';
    FONTS.forEach(f => {
        const btn = document.createElement('button'); btn.className = 'pp-font-btn' + (f.id === activeFontId ? ' active' : '');
        btn.innerHTML = `<span class="pp-font-preview" style="font-family:${f.family}">${f.preview}</span>${f.name}`;
        btn.onclick = () => setFont(f.id); grid.appendChild(btn);
    });
    if(activeFontId === 'custom') { const cBtn = document.createElement('button'); cBtn.className = 'pp-font-btn active'; cBtn.innerHTML = `<span class="pp-font-preview" style="font-family:CustomUserFont">Aa</span>Custom`; cBtn.onclick = () => setFont('custom'); grid.appendChild(cBtn); }
}

function buildPalettePanel() {
    const container = document.getElementById('pp-categories'); if(!container) return; container.innerHTML = '';
    PAL_CATS.forEach(cat => {
        const items = PALETTES.filter(p => p.cat === cat); if(!items.length) return;
        const sec = document.createElement('div'); sec.className = 'pp-category'; sec.innerHTML = `<div class="pp-cat-label">${cat}</div><div class="pp-grid" id="pg-${cat.replace(/[\s&]/g,'')}"></div>`;
        container.appendChild(sec); const grid = sec.querySelector('.pp-grid');
        items.forEach(p => {
            const i = PALETTES.indexOf(p); const v = isDark ? p.dark : p.light;
            const a1 = customAccents && i === palIdx ? customAccents.a1 : v.a1; const a2 = customAccents && i === palIdx ? customAccents.a2 : v.a2; const a3 = customAccents && i === palIdx ? customAccents.a3 : v.a3;
            const el = document.createElement('div'); el.className = 'pp-item' + (i === palIdx ? ' active' : '');
            el.innerHTML = `<div class="pp-dots"><div class="pp-dot" style="background:${a1}"></div><div class="pp-dot" style="background:${a2}"></div><div class="pp-dot" style="background:${a3}"></div></div><span>${p.name}</span>`;
            el.onclick = () => { palIdx = i; sessionStorage.setItem('palIdx', palIdx); if(customAccents) { customAccents = null; localStorage.removeItem('custom_palette'); document.getElementById('pp-custom-trigger').classList.remove('active'); } applyPalette(palIdx); };
            grid.appendChild(el);
        });
    });
    if(customAccents) { document.getElementById('cust-d1').style.background = customAccents.a1; document.getElementById('cust-d2').style.background = customAccents.a2; document.getElementById('cust-d3').style.background = customAccents.a3; document.getElementById('cust-d4').style.background = customAccents.text; document.getElementById('pp-custom-trigger').classList.add('active'); }
    buildFontPicker(); renderSavedPalettes();
}

let panelOpen = false;
function togglePalettePanel() { 
    panelOpen = !panelOpen; 
    document.getElementById('palette-panel').classList.toggle('open', panelOpen); 
    const po = document.getElementById('palette-overlay');
    if(po) po.classList.toggle('active', panelOpen);
}
document.addEventListener('click', e => { 
    if(panelOpen && !e.target.closest('#palette-panel') && !e.target.closest('#customise-btn')) { 
        panelOpen = false; 
        document.getElementById('palette-panel').classList.remove('open'); 
        const po = document.getElementById('palette-overlay');
        if(po) po.classList.remove('active');
    } 
});

/* ── Custom Accents & Saving ── */
let customBodyOpen = false;
function toggleCustomBody() {
    customBodyOpen = !customBodyOpen; document.getElementById('pp-custom-body').classList.toggle('visible', customBodyOpen);
    const chev = document.getElementById('custom-chevron'); if(chev) chev.style.transform = customBodyOpen ? 'rotate(180deg)' : '';
    if(customBodyOpen) {
        const p = PALETTES[palIdx]; const v = isDark ? p.dark : p.light;
        const a1 = customAccents ? customAccents.a1 : v.a1; 
        const a2 = customAccents ? customAccents.a2 : v.a2; 
        const a3 = customAccents ? customAccents.a3 : v.a3;
        const pText = customAccents && customAccents.text ? customAccents.text : getReadableAccent(a1, isDark);

        document.getElementById('cp1').value = ensureFullHex(a1); 
        document.getElementById('cp2').value = ensureFullHex(a2); 
        document.getElementById('cp3').value = ensureFullHex(a3);
        document.getElementById('cp1-hex').textContent = a1; 
        document.getElementById('cp2-hex').textContent = a2; 
        document.getElementById('cp3-hex').textContent = a3;

        document.getElementById('cp-acc-text').value = ensureFullHex(pText); 
        document.getElementById('cp-acc-text-hex').textContent = ensureFullHex(pText);
    }
}
function onColorPick() { 
    ['1','2','3'].forEach(n => { const v = document.getElementById('cp'+n).value; document.getElementById('cp'+n+'-hex').textContent = v; }); 
    const tVal = document.getElementById('cp-acc-text').value; document.getElementById('cp-acc-text-hex').textContent = tVal;
}
function applyCustomAccents(slotIdx = -1) { 
    customAccents = { 
        a1: document.getElementById('cp1').value, 
        a2: document.getElementById('cp2').value, 
        a3: document.getElementById('cp3').value, 
        text: document.getElementById('cp-acc-text').value,
        slot: slotIdx 
    }; 
    localStorage.setItem('custom_palette', JSON.stringify(customAccents)); 
    applyPalette(palIdx); 
    renderSavedPalettes(); 
}
function resetCustomAccents() { customAccents = null; localStorage.removeItem('custom_palette'); applyPalette(palIdx); document.getElementById('pp-custom-trigger').classList.remove('active'); renderSavedPalettes(); }
function ensureFullHex(hex) { if(!hex) return '#000000'; hex = hex.trim(); if(!hex.startsWith('#')) hex = '#' + hex; if(hex.length === 4) hex = '#' + hex[1]+hex[1] + hex[2]+hex[2] + hex[3]+hex[3]; return hex.length === 7 ? hex : '#000000'; }
function saveCustomPaletteSlot() { 
    if(savedPalettes.length >= 10) { alert("Maximum 10 custom palettes saved."); return; } 
    const p = { 
        a1: document.getElementById('cp1').value, 
        a2: document.getElementById('cp2').value, 
        a3: document.getElementById('cp3').value, 
        text: document.getElementById('cp-acc-text').value,
        id: Date.now() 
    }; 
    savedPalettes.push(p); 
    localStorage.setItem('saved_palettes', JSON.stringify(savedPalettes)); 
    applyCustomAccents(savedPalettes.length - 1); 
}
function loadSavedPalette(idx) { 
    const p = savedPalettes[idx]; if(!p) return; 
    document.getElementById('cp1').value = ensureFullHex(p.a1); 
    document.getElementById('cp2').value = ensureFullHex(p.a2); 
    document.getElementById('cp3').value = ensureFullHex(p.a3); 
    const pText = p.text || getReadableAccent(p.a1, isDark);
    document.getElementById('cp-acc-text').value = ensureFullHex(pText);
    onColorPick(); applyCustomAccents(idx); 
}
window.delSavedPalette = function(e, idx) { e.stopPropagation(); savedPalettes.splice(idx,1); localStorage.setItem('saved_palettes', JSON.stringify(savedPalettes)); if (customAccents && customAccents.slot === idx) { applyCustomAccents(-1); } else if (customAccents && customAccents.slot > idx) { applyCustomAccents(customAccents.slot - 1); } else { renderSavedPalettes(); } };
function renderSavedPalettes() { 
    const list = document.getElementById('saved-palettes-list'); list.innerHTML = ''; 
    savedPalettes.forEach((p, idx) => { 
        const isActive = customAccents && customAccents.slot === idx; 
        const item = document.createElement('div'); 
        item.className = 'pp-saved-item' + (isActive ? ' active' : ''); 
        if(isActive) { item.style.borderColor = 'var(--accent)'; item.style.color = 'var(--accent)'; item.style.background = 'rgba(var(--accent-rgb),0.1)'; } 
        const textCol = p.text || getReadableAccent(p.a1, isDark);
        item.innerHTML = `<div style="display:flex;gap:4px;align-items:center"><div class="pp-dots"><div class="pp-dot" style="background:${p.a1}"></div><div class="pp-dot" style="background:${p.a2}"></div><div class="pp-dot" style="background:${p.a3}"></div><div class="pp-dot" style="background:${textCol}"></div></div> Slot ${idx+1}</div><div class="del-btn-wrap" onclick="delSavedPalette(event, ${idx})"><i data-lucide="x" size="12"></i></div>`; 
        item.onclick = () => loadSavedPalette(idx); 
        list.appendChild(item); 
    }); 
    lucide.createIcons(); 
}

// Apply initial styles
setFont(activeFontId); applyPalette(palIdx);

/* ═══════════════════════════════════════════════
   UI INTERACTION LOGIC
═══════════════════════════════════════════════ */
lucide.createIcons();
function toggleSidebar() { 
    const sidebar = document.getElementById('sidebar'); 
    const overlay = document.getElementById('overlay-ui'); 
    const btnIcon = document.querySelector('.menu-btn i'); 
    sidebar.classList.toggle('active'); 
    overlay.classList.toggle('active'); 
    btnIcon.setAttribute('data-lucide', sidebar.classList.contains('active') ? 'x' : 'menu');

}

function showFullScreenLoader() { 
    const l = document.getElementById('loader'); 
    l.style.display = 'flex'; l.style.opacity = '1'; l.classList.remove('fade-out'); 
}
function hideLoader() { 
    const l = document.getElementById('loader'); 
    l.classList.add('fade-out'); setTimeout(() => l.style.display = 'none', 450); 
}

function runSearch() {
    const q = document.getElementById('node-search').value.toLowerCase().trim();
    document.querySelectorAll('.repo-card').forEach(card => { 
        const name = card.querySelector('.repo-name').innerText.toLowerCase();
        const desc = card.querySelector('.card-desc').innerText.toLowerCase();
        if(name.includes(q) || desc.includes(q)) {
            card.style.display = '';
        } else {
            card.style.display = 'none';
        }
    });
}

/* ═══════════════════════════════════════════════
   FETCH GITHUB REPOS (CREATIONS PAGE LOGIC)
═══════════════════════════════════════════════ */
const username = "sd6387400-lang";
const hiddenRepos = ["sd6387400-lang.github.io", "config"];

async function fetchRepos() {
    showFullScreenLoader();
    try {
        const response = await fetch(`https://api.github.com/users/${username}/repos?sort=updated`);
        const repos = await response.json();
        const container = document.getElementById('grid');
        container.innerHTML = '';
        
        let cardIndex = 0;

        repos.forEach(repo => {
            if (!hiddenRepos.includes(repo.name) && !repo.fork) {
                const card = document.createElement('div');
                card.className = 'repo-card';
                card.style.setProperty('--delay', (0.55 + cardIndex * 0.14) + 's');
                cardIndex++;

                // Make the entire card clickable to go to the live deployed site
                card.setAttribute('onclick', `window.open('https://${username}.github.io/${repo.name}/', '_blank')`);

                card.innerHTML = `
                    <div class="repo-name">${repo.name.replace(/-/g, ' ')}</div>
                    <div class="card-desc" style="flex-grow:1; margin-bottom: 24px;">${repo.description || 'Exploring code and creativity.'}</div>
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-top:auto; flex-wrap:wrap; gap:10px;">
                        <span style="font-size:0.75rem; font-weight:800; color:var(--accent-text); text-transform:uppercase; letter-spacing:0.05em">${repo.language || 'Code'}</span>
                        <div style="display:flex; gap:8px;">
                            <a href="${repo.html_url}" target="_blank" class="back-pill" style="padding:8px 14px; font-size:0.75rem; border-radius:12px; gap:4px; box-shadow:none" onclick="event.stopPropagation();">
                                <i data-lucide="code-2" style="width:14px; height:14px;"></i> Code
                            </a>
                            <a href="${repo.html_url}/releases" target="_blank" class="back-pill" style="padding:8px 14px; font-size:0.75rem; border-radius:12px; gap:4px; background:transparent; color:var(--accent-text); border:1.5px solid var(--accent); box-shadow:none" onclick="event.stopPropagation();">
                                <i data-lucide="package" style="width:14px; height:14px;"></i> Releases
                            </a>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            }
        });
        lucide.createIcons();
        hideLoader();
    } catch (e) { 
        document.getElementById('grid').innerHTML = '<div style="padding:40px;opacity:0.5;font-weight:600;color:var(--accent-text)">Error loading creations. Check your connection or API limits.</div>'; 
        hideLoader();
    }
}

// Initialise the fetch when the page loads
window.onload = fetchRepos;
</script>
